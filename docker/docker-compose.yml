version: "3.8"

services:
  assistant-pi:
    image: python:3.9-slim
    container_name: assistant-pi
    working_dir: /app
    volumes:
      - ../:/app
    command: bash -lc "pip install -r requirements.txt && uvicorn backend.main:app --host 0.0.0.0 --port 8080"
    ports:
      - "6000:6000"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - WHISPER_BIN=/app/whisper.cpp/main
      - WHISPER_MODEL=/app/models/ggml-base.en.bin
      - PIPER_BIN=piper
      - PIPER_MODEL=/app/models/en_US-lessac-medium.onnx
    restart: unless-stopped

# Notes:
# 1) Docker on Raspberry Pi can be heavier than direct host execution.
# 2) Ollama is recommended on host OS for best performance.
