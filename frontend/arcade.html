<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Highway Escape Arcade</title>
  <style>
    :root {
      --bg: #101722;
      --ink: #eff6ff;
      --accent: #ff7b00;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 50% 10%, #21354d, transparent 50%), var(--bg);
      color: var(--ink);
      font-family: "Bai Jamjuree", "Noto Sans", sans-serif;
      padding: 10px;
    }
    .panel {
      width: min(920px, 100%);
      background: rgba(10, 16, 28, 0.85);
      border: 2px solid #253548;
      border-radius: 16px;
      padding: 14px;
    }
    nav a { color: #b6cdfc; margin-right: 12px; text-decoration: none; }
    #ui {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 8px;
      margin: 10px 0;
      align-items: center;
    }
    #assistantLine { color: #ffd9a8; min-height: 1.2em; }
    canvas {
      width: 100%;
      max-width: 900px;
      height: auto;
      border-radius: 12px;
      border: 2px solid #2f4056;
      background: #1a2432;
      display: block;
      margin-inline: auto;
    }
    button {
      background: var(--accent);
      color: #1e1300;
      border: 0;
      border-radius: 8px;
      padding: 9px 12px;
      font-weight: 800;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Highway Escape</h1>
    <nav>
      <a href="/">Home</a>
      <a href="/chat">Chat</a>
      <a href="/sensors">Sensors</a>
    </nav>

    <div id="ui">
      <div>Score: <strong id="score">0</strong> | High: <strong id="high">0</strong></div>
      <button id="restartBtn">Restart</button>
    </div>
    <div id="assistantLine">Assistant: Tilt to steer. Survive as long as possible.</div>

    <canvas id="game" width="900" height="500"></canvas>
  </main>

  <script src="/static/game.js"></script>
</body>
</html>
