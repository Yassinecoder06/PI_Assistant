<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Highway Escape Arcade</title>
  <link rel="stylesheet" href="/static/styles/arcade.css" />
</head>
<body>
  <main class="panel">
    <h1>Highway Escape</h1>
    <nav>
      <a href="/">Home</a>
      <a href="/chat">Chat</a>
      <a href="/sensors">Sensors</a>
    </nav>

    <div id="ui">
      <div>Score: <strong id="score">0</strong> | High: <strong id="high">0</strong></div>
      <button id="restartBtn">Restart</button>
    </div>
    <div id="assistantLine">Assistant: Tilt to steer. Survive as long as possible.</div>

    <canvas id="game" width="900" height="500"></canvas>
  </main>

  <script src="/static/game.js"></script>
</body>
</html>
