<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistant Pi Sensors</title>
  <style>
    :root {
      --bg: #eef3f4;
      --ink: #1e2830;
      --surface: #ffffff;
      --line: #d9e0e5;
      --accent: #b33221;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", "Noto Sans", sans-serif;
      background: radial-gradient(circle at 100% 0%, #ffe6d8, transparent 34%),
                  radial-gradient(circle at 0% 100%, #d7ebff, transparent 32%),
                  var(--bg);
      color: var(--ink);
      padding: 20px;
    }
    nav a { margin-right: 14px; color: var(--accent); text-decoration: none; font-weight: 700; }
    .grid {
      margin-top: 20px;
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    }
    .card {
      background: var(--surface);
      border: 2px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 8px 30px rgba(40, 50, 60, 0.07);
    }
    h1 { margin-bottom: 6px; }
    .big { font-size: 1.5rem; font-weight: 800; }
    .muted { color: #5d6570; }
  </style>
</head>
<body>
  <h1>Live Sensors</h1>
  <nav>
    <a href="/">Home</a>
    <a href="/chat">Chat</a>
    <a href="/arcade">Arcade</a>
  </nav>

  <div class="grid">
    <div class="card"><div class="muted">Gyro X</div><div class="big" id="gx">0</div></div>
    <div class="card"><div class="muted">Gyro Y</div><div class="big" id="gy">0</div></div>
    <div class="card"><div class="muted">Gyro Z</div><div class="big" id="gz">0</div></div>
    <div class="card"><div class="muted">Light</div><div class="big" id="light">0</div></div>
  </div>

  <script>
    const wsProto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${wsProto}://${location.host}/sensor-stream`);

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);
      document.getElementById('gx').textContent = data.gyro.x;
      document.getElementById('gy').textContent = data.gyro.y;
      document.getElementById('gz').textContent = data.gyro.z;
      document.getElementById('light').textContent = data.light.value;
    };
  </script>
</body>
</html>
