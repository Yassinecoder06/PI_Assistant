<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistant Pi Sensors</title>
  <link rel="stylesheet" href="/static/styles/sensors.css" />
</head>
<body>
  <h1>Live Sensors</h1>
  <nav>
    <a href="/">Home</a>
    <a href="/chat">Chat</a>
    <a href="/arcade">Arcade</a>
  </nav>

  <div class="grid">
    <div class="card"><div class="muted">Gyro X</div><div class="big" id="gx">0</div></div>
    <div class="card"><div class="muted">Gyro Y</div><div class="big" id="gy">0</div></div>
    <div class="card"><div class="muted">Gyro Z</div><div class="big" id="gz">0</div></div>
    <div class="card"><div class="muted">Light</div><div class="big" id="light">0</div></div>
  </div>

  <script>
    const wsProto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${wsProto}://${location.host}/sensor-stream`);

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);
      document.getElementById('gx').textContent = data.gyro.x;
      document.getElementById('gy').textContent = data.gyro.y;
      document.getElementById('gz').textContent = data.gyro.z;
      document.getElementById('light').textContent = data.light.value;
    };
  </script>
</body>
</html>
