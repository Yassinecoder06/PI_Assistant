<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistant Pi Chat</title>
  <style>
    :root {
      --bg: #f7f4ed;
      --ink: #182030;
      --surface: #ffffff;
      --line: #e2ddcf;
      --accent: #0d7c66;
      --user: #e8f9f3;
      --bot: #edf3ff;
    }
    body {
      margin: 0;
      font-family: "Source Sans 3", "Noto Sans", sans-serif;
      background: linear-gradient(165deg, #faf4e7, #eef6ff 65%);
      color: var(--ink);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .panel {
      width: min(920px, 100%);
      border: 2px solid var(--line);
      border-radius: 16px;
      background: var(--surface);
      box-shadow: 0 18px 45px rgba(22, 35, 60, 0.08);
      overflow: hidden;
    }
    header {
      padding: 14px 18px;
      border-bottom: 2px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    nav a { color: var(--accent); margin-right: 14px; font-weight: 700; text-decoration: none; }
    #log {
      height: 55vh;
      overflow-y: auto;
      padding: 14px;
      display: grid;
      gap: 10px;
      background: #fffef9;
    }
    .msg {
      max-width: 85%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #d8d8d8;
    }
    .u { justify-self: end; background: var(--user); }
    .a { justify-self: start; background: var(--bot); }
    form {
      border-top: 2px solid var(--line);
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
    }
    input, button {
      border: 1px solid #c7c4bb;
      border-radius: 10px;
      padding: 10px;
      font-size: 1rem;
    }
    button {
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    #status { font-size: .85rem; color: #4b5563; padding: 0 12px 10px; }
  </style>
</head>
<body>
  <main class="panel">
    <header>
      <strong>Assistant Pi Chat</strong>
      <nav>
        <a href="/">Home</a>
        <a href="/sensors">Sensors</a>
        <a href="/arcade">Arcade</a>
      </nav>
    </header>

    <section id="log"></section>
    <div id="status">Ready.</div>

    <form id="chatForm">
      <input id="message" placeholder="Ask something... e.g. start a game" autocomplete="off" />
      <button type="button" id="voiceBtn">Voice</button>
      <button type="submit">Send</button>
    </form>
  </main>

  <script>
    const log = document.getElementById('log');
    const statusEl = document.getElementById('status');
    const form = document.getElementById('chatForm');
    const input = document.getElementById('message');
    const voiceBtn = document.getElementById('voiceBtn');

    const history = [];

    function addMessage(role, text) {
      const div = document.createElement('div');
      div.className = `msg ${role === 'user' ? 'u' : 'a'}`;
      div.textContent = text;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
      history.push({ role, text });
    }

    async function sendMessage(text) {
      if (!text.trim()) return;
      addMessage('user', text);
      input.value = '';
      statusEl.textContent = 'Thinking...';

      const response = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text,
          history: history.map(m => ({ role: m.role, content: m.text }))
        })
      });

      if (!response.ok) {
        statusEl.textContent = 'Chat request failed.';
        return;
      }

      const data = await response.json();
      addMessage('assistant', `${data.reply} [${data.model}]`);
      statusEl.textContent = `Task: ${data.task}`;

      try {
        const ttsRes = await fetch('/voice/speak', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: data.reply })
        });
        if (ttsRes.ok) {
          const audioBlob = await ttsRes.blob();
          const audioUrl = URL.createObjectURL(audioBlob);
          const audio = new Audio(audioUrl);
          audio.play();
        } else {
          let detail = 'TTS failed. Check Piper on the Pi.';
          try {
            const err = await ttsRes.json();
            if (err && err.detail) detail = String(err.detail);
          } catch (_) {}
          statusEl.textContent = detail;
        }
      } catch (_) {
        statusEl.textContent = 'TTS failed. Check Piper on the Pi.';
      }

      if (data.start_game) {
        await fetch('/game/start', { method: 'POST' });
        window.location.href = '/arcade';
      }
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      sendMessage(input.value);
    });

    let mediaRecorder;
    let chunks = [];

    voiceBtn.addEventListener('click', async () => {
      if (!mediaRecorder || mediaRecorder.state === 'inactive') {
        if (!window.isSecureContext) {
          statusEl.textContent = 'Mic requires HTTPS or localhost in most browsers.';
          return;
        }
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          statusEl.textContent = 'Browser microphone API is unavailable.';
          return;
        }

        let stream;
        try {
          stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        } catch (_) {
          statusEl.textContent = 'Microphone permission denied or unavailable.';
          return;
        }

        mediaRecorder = new MediaRecorder(stream);
        chunks = [];

        mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
        mediaRecorder.onstop = async () => {
          statusEl.textContent = 'Transcribing...';
          const blob = new Blob(chunks, { type: 'audio/webm' });
          const file = new File([blob], 'recording.webm', { type: 'audio/webm' });
          const formData = new FormData();
          formData.append('audio', file);

          try {
            const res = await fetch('/voice/transcribe', { method: 'POST', body: formData });
            const data = await res.json();
            if (!res.ok) {
              statusEl.textContent = (data && data.detail) ? String(data.detail) : 'Transcription failed.';
              return;
            }
            input.value = data.text || '';
            statusEl.textContent = data.text ? 'Voice ready. Press Send.' : 'No speech recognized.';
          } catch (_) {
            statusEl.textContent = 'Transcription request failed.';
          }
        };

        mediaRecorder.start();
        voiceBtn.textContent = 'Stop';
        statusEl.textContent = 'Recording...';
      } else {
        mediaRecorder.stop();
        voiceBtn.textContent = 'Voice';
      }
    });
  </script>
</body>
</html>
